---
- name: Check multiple files
  hosts: all
  tasks:
    - name: Check file existence
      stat:
        path: "{{ item }}"
      loop:
        - /etc/passwd
        - /etc/testfile
      register: file_check

    - name: Print missing files
      debug:
        msg: "{{ item.item }} does not exist"
      loop: "{{ file_check.results }}"
      when: not item.stat.exists

