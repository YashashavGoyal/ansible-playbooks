---
 - name: Nginx Service Config
   hosts: servers

   tasks:
     - name: install nginx
       yum: 
         name: nginx
         state: present
       notify: restart service

     - name: copying config
       template:
         src: nginx.conf.j2
         dest: /etc/nginx/nginx.conf
       notify: reload service


   handlers:
     - name: restart service
       service:
         name: nginx
         state: restarted

     - name: reload service
       service:
         name: nginx
         state: reloaded
